name: Auto Blog Generator

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
    - cron: '0 13 * * 1,3,5'
    - cron: '0 16 * * 1,2,4'
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and add blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_blog.py

      - name: Commit new blog post
        run: |
          git config --global user.email "hadionlineclas@gmail.com"
          git config --global user.name "SERPSnap Bot"
          git add blog.html
          git diff --staged --quiet || git commit -m "Add new blog post - $(date +'%Y-%m-%d %H:%M')"
          git push
