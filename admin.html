<!DOCTYPE html>
<html>
<head>
    <title>SERPSnap Private Admin</title>
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:#0a0a0a; color:white; font-family:sans-serif; padding:50px;">
    <div style="max-width:500px; margin:auto; background:#161616; padding:30px; border-radius:15px; border:1px solid #333;">
        <h2>🚀 Post to Blog</h2>
        <input type="text" id="topic" placeholder="Topic likho..." style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
        <button onclick="publish()" style="width:100%; padding:15px; background:#ffb400; color:black; font-weight:bold; border:none; cursor:pointer; border-radius:5px;">GENERATE & PUBLISH</button>
        <p id="status" style="color:#ffb400; margin-top:10px;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPRdJ0mKV22T0ZGY5SgpX4GFm1m8IqSpc",
            authDomain: "gen-lang-client-0164718316.firebaseapp.com",
            projectId: "gen-lang-client-0164718316",
            appId: "1:72325647750:web:455de5a0d8db5264de7007"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function publish() {
            const topic = document.getElementById('topic').value;
            const status = document.getElementById('status');
            if(!topic) return alert("Bhai topic?");
            
            status.innerText = "⏳ AI is writing (Techendy Engine)...";
            
            try {
                const response = await puter.ai.chat(`Write a humanized SEO blog about ${topic}. Return JSON with title, content, emoji, gradient, and keywords array.`, { model: 'gpt-4o-mini' });
                let data = JSON.parse(response.message.content.replace(/```json/g, '').replace(/```/g, ''));
                
                await db.collection("articles").add({
                    ...data,
                    status: 'published',
                    createdAt: new Date().toISOString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                status.innerText = "✅ Blog Live Ho Gaya!";
            } catch (e) { status.innerText = "❌ Error: " + e.message; }
        }
    </script>
</body>
</html>
